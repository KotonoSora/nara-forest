<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d5a27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="leafGradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#7da87b;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#4a7c59;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5a27;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Tree trunk -->
  <rect x="45" y="60" width="10" height="30" fill="url(#treeGradient)" rx="2"/>
  
  <!-- Tree foliage layers -->
  <ellipse cx="50" cy="55" rx="25" ry="20" fill="url(#leafGradient)" opacity="0.9"/>
  <ellipse cx="50" cy="45" rx="22" ry="18" fill="url(#leafGradient)" opacity="0.8"/>
  <ellipse cx="50" cy="35" rx="18" ry="15" fill="url(#leafGradient)" opacity="0.9"/>
  
  <!-- Highlights for depth -->
  <ellipse cx="45" cy="35" rx="6" ry="5" fill="#a8d8a8" opacity="0.6"/>
  <ellipse cx="48" cy="45" rx="8" ry="6" fill="#a8d8a8" opacity="0.4"/>
  <ellipse cx="42" cy="52" rx="7" ry="5" fill="#a8d8a8" opacity="0.5"/>
  
  <!-- Timer ring around tree (optional, can be controlled by JS) -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#7da87b" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
</svg>
